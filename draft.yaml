models:
  Church:
    name: string
    is_federation: boolean default:false
    boards: hasMany Board
    registrations: hasMany Registration

  Board:
    church_id: id foreign
    year_start: integer
    year_end: integer
    president_name: string
    vice_president_name: string nullable
    secretary_name: string nullable
    treasurer_name: string nullable
    image_path: string nullable
    is_active: boolean default:false

  Event:
    title: string
    slug: string unique
    description: longtext nullable
    event_date: datetime
    location: string nullable
    price: decimal:10,2 default:0
    requires_receipt: boolean default:false
    custom_fields: json nullable
    status: enum:draft,published,closed default:'draft'
    registrations: hasMany Registration

  Registration:
    event_id: id foreign cascadeOnDelete
    church_id: id foreign nullable constrained
    name: string
    email: string
    phone: string
    payment_status: enum:pending,paid,failed default:'pending'
    payment_id: string nullable
    pix_qr_code: longtext nullable
    receipt_path: string nullable
    custom_answers: json nullable